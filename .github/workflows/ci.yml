name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
        working-directory: api
      - run: npm test
        working-directory: api
